name: 🏀 NBA Bot - Apuestas +EV Diarias

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC = 1:00 AM Colombia
  workflow_dispatch:       # Ejecución manual desde GitHub

jobs:
  run-ev-bot:
    name: Ejecutar Pipeline NBA +EV
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🔐 Crear archivo .env con secretos
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: 📊 Paso 1 - Descargar cuotas de casinos (odds.py)
        run: python odds.py

      - name: 🔄 Paso 2 - Actualizar stats desde Supabase (update_stats.py)
        run: python update_stats.py
        continue-on-error: true   # Si falla (IP bloqueada), el análisis usa datos previos

      - name: 🤖 Paso 3 - Analizar y enviar apuestas a Telegram (analyzer.py)
        run: python analyzer.py
