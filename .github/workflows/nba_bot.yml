name: 🏀 NBA Bot - Apuestas +EV ELITE

on:
  schedule:
    - cron: '0 6 * * *'    # 1:00 AM Colombia — análisis nocturno principal
    - cron: '0 18 * * *'   # 1:00 PM Colombia — re-check pre-game
  workflow_dispatch:

jobs:
  run-ev-bot:
    name: Pipeline NBA +EV Elite
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🔐 Crear .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env
          echo "ODDS_API_KEY_1=${{ secrets.ODDS_API_KEY_1 }}" >> .env
          echo "ODDS_REGIONS=us" >> .env
          echo "ODDS_SPORTS=basketball_nba" >> .env
          echo "ODDS_FETCH_NBA_PROPS=1" >> .env
          echo "LOCK_MODE=1" >> .env
          echo "ALLOWED_BOOKIES=unibet,betrivers,bet365,williamhill,betsson,betfair,888sport,bovada" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: 📊 Paso 1 — Cuotas + Line Movement (odds.py)
        run: python odds.py

      - name: 🔄 Paso 2 — Actualizar stats (update_stats.py)
        run: python update_stats.py
        continue-on-error: true

      - name: 🤖 Paso 3 — Análisis Elite + Telegram (analyzer.py)
        run: python analyzer.py

      - name: 📁 Guardar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: bot_ingestion.log
          retention-days: 7
